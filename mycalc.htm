<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Academic Calculator Simulation</title>
    <style>
        .calc-box { width: 250px; padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
        #display { width: 100%; height: 40px; text-align: right; margin-bottom: 10px; font-size: 1.2rem; }
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        button { padding: 15px; font-size: 1rem; cursor: pointer; border: 1px solid #ddd; border-radius: 4px; }
        button:hover { background-color: #f0f0f0; }
        .operators { grid-column: span 3; display: flex; gap: 5px; margin-top: 5px; }
        .operators button { flex: 1; background-color: #e8f0fe; }
    </style>
</head>
<body>

<div class="calc-box">
    <input type="text" id="display" readonly>

    <div class="btn-grid">
        <button onclick="appendToDisplay('1')">1</button>
        <button onclick="appendToDisplay('2')">2</button>
        <button onclick="appendToDisplay('3')">3</button>
        <button onclick="appendToDisplay('4')">4</button>
        <button onclick="appendToDisplay('5')">5</button>
        <button onclick="appendToDisplay('6')">6</button>
        <button onclick="appendToDisplay('7')">7</button>
        <button onclick="appendToDisplay('8')">8</button>
        <button onclick="appendToDisplay('9')">9</button>
    </div>

    <div class="operators">
        <button onclick="appendToDisplay('+')">+</button>
        <button onclick="appendToDisplay('-')">-</button>
        <button onclick="calculate()">=</button>
        <button onclick="clearDisplay()" style="background:#ffcccc;">C</button>
    </div>
</div>

<script>
    /**
     * Calculator Logic Module
     */
    const display = document.getElementById('display');

    // Appends numbers or operators to the display string
    function appendToDisplay(input) {
        display.value += input;
    }

    // Clears the display
    function clearDisplay() {
        display.value = "";
    }

    // Performs the calculation
    function calculate() {
        try {
            // Using eval() for educational simulation of string-to-math parsing
            // In a real M.Sc project, consider building a custom parser for security
            display.value = eval(display.value);
        } catch (error) {
            display.value = "Error";
            setTimeout(clearDisplay, 1500);
        }
    }
</script>

</body>
</html>
